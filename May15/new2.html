<html>
<head>
<title>Task Manager</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}
body{
background:#f3f3f3;
padding:40px;
}
.container{
width:700px;
background:white;
padding:30px;
border-radius:15px;
margin:auto;
}
h1{
margin-bottom:10px;
}
.count{
color:gray;
margin-bottom:25px;
}
.top{
display:flex;
gap:10px;
margin-bottom:25px;
}
.top input{
flex:1;
padding:12px;
border:1px solid gray;
border-radius:10px;
font-size:17px;
}
#search{
width:100%;
padding:12px;
border:1px solid gray;
border-radius:10px;
font-size:17px;
margin-bottom:25px;
}
button{
padding:12px 20px;
border:none;
background:blue;
color:white;
border-radius:10px;
cursor:pointer;
}
#tasks{
min-height:200px;
}
.task{
background:gray;
padding:12px;
border-radius:10px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
}
.edit{
background:blue;
margin-right:10px;}
.delete{
background:blue;
}
.clear{
margin-top:20px;
background:white;
color:black;
border:1px solid gray;
}
</style>
</head>
<body>
<div class="container">
<h1>Smart Task Manager</h1>
<p class="count">
<span id="count">0</span> tasks
</p>
<div class="top">
<input
type="text"
id="taskInput"
placeholder="Enter task">
<button id="addBtn">
Add
</button>
</div>
<input
type="text"
id="search"
placeholder="Search task">
<div id="tasks"></div>
<button
class="clear"
id="clearBtn">
Clear All
</button>
</div>
<script>
const taskInput =document.getElementById("taskInput");
const addBtn =document.getElementById("addBtn");
const tasksDiv =document.getElementById("tasks");
const search =document.getElementById("search");
const clearBtn =document.getElementById("clearBtn");
const count =document.getElementById("count");
let tasks = [];
let editIndex = null;
function showTask(arr){
tasksDiv.innerHTML = "";
arr.forEach((task,index)=>{
tasksDiv.innerHTML +=`<div class="task">
<span>${task}</span>
<div>
<button class="edit" onclick="editTask(${index})">
edit
</button>
<button
class="delete"
onclick="deleteTask(${index})">
Delete
</button>
</div>
</div>`;
});
count.textContent =
arr.length;
}
function deleteTask(index){
tasks.splice(index,1);
showTask(tasks);
}
function editTask(index){
taskInput.value = tasks[index];
editIndex = index;
taskInput.focus();
}
addBtn.addEventListener(
"click",()=>{
if(!taskInput.value.trim())
return;
tasks.push(taskInput.value);
tasks[editIndex] =
taskInput.value;
editIndex = null;

showTask(tasks);
taskInput.value = "";
}
);
search.addEventListener(
"input",()=>{
const filtered =tasks.filter((task)=>{
return task
.toLowerCase()
.includes(
search.value.toLowerCase()
);
});
showTask(filtered);
}
);
clearBtn.addEventListener(
"click",()=>{
tasks = [];
showTask(tasks);
search.value = "";
}
);
</script>
</body>
</html>
