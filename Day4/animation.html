<html>
<head>
<title>
Animation
</title>
<style>
:root{
--ease:cubic-bezier(.22,1,.36,1);
}
*{
margin:0;
padding:0;
box-sizing:border-box;
}
body{
background-color:blue;
color:white;
font-family:sans-serif;
}
.hero{
display:flex;
min-height:100vh;
flex-direction:column;
justify-content:center;
padding:0;
}
.line span{
display:block;
font-size:clamp(90px,12vw,220px);
font-weight:800;
line-height:.9;
letter-spacing:-10px;
transform:translateY(120%);
opacity:0;
animation:slideUp 1.2s var(--ease) forwards;
}
.line:nth-child(1) span{
animation-delay:.1s;
}
.line:nth-child(2) span{
animation-delay:.35s;
}
.line:nth-child(3) span{
animation-delay:.6s;
}
.boxes{
margin-top:70px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:24px;
}
.box{
height:220px;
border-radius:24px;
background:white;
border:1px solid white;
opacity:0;
transform:
translateY(100px)
scale(.92);
animation:boxReveal 1.2s var(--ease) forwards;
}
.box:nth-child(1){
animation-delay:1.4s;
}
.box:nth-child(2){
animation-delay:1.7s;
}
.box:nth-child(3){
animation-delay:2s;
}
.wrapper{
margin-top:60px;
opacity:0;
animation:showText 1s ease forwards;
animation-delay:2.5s;
}
.marquee{
display:flex;
gap:80px;
width:max-content;
animation:moveLeft 8s linear infinite;
}
.wrapper:hover .marquee{
animation-play-state:paused;
}
.marquee span{
font-size:60px;
font-weight:700;
white-space:nowrap;
color:white;
}
.rotate{
margin-top:80px;
display:flex;
justify-content:center;
opacity:0;
animation:showText 1s ease forwards;
animation-delay:3s;
}
.rotate-box{
width:420px;
height:260px;
overflow:hidden;
border-radius:26px;
border:1px solid #2e2e2e;
}
.rotate-box img{
width:100%;
height:100%;
object-fit:cover;
animation:rotateImage 6s linear infinite;
}
.rotate-box:hover img{
animation-play-state:paused;
}
.slideup-section{
margin-top:90px;
display:flex;
justify-content:center;
opacity:0;
animation:showText 1s ease forwards;
animation-delay:3.5s;
}
.slideup-box{
width:420px;
height:260px;
overflow:hidden;
border-radius:24px;
border:2px solid white;
position:relative;
}
.slideup-box img{
width:100%;
height:100%;
object-fit:cover;
animation:imageSlideUp 3s var(--ease) infinite;
}
.slideup-box:hover img{
animation-play-state:paused}
.scaleup-section{
margin-top:90px;
display:flex;
justify-content:center;
opacity:0;
animation:showText 1s ease forwards;
animation-delay:4s;
}
.scaleup-box{
width:420px;
height:260px;
overflow:hidden;
border-radius:24px;
border:2px solid white;
}
.scaleup-box img{
width:100%;
height:100%;
object-fit:cover;
animation:imageScaleUp 3s var(--ease) infinite;
}
.scaleup-box:hover img{
animation-play-state:paused;}

.welcome-wrapper{
margin-top:90px;
overflow:hidden;
opacity:0;
animation:showText 1s ease forwards;
animation-delay:4.5s;
}
.welcome-marquee{
display:flex;
gap:80px;
width:max-content;
animation:welcomeMove 10s linear infinite;
}
.welcome-wrapper:hover .welcome-marquee{
animation-play-state:paused;
}
.welcome-marquee span{
font-size:60px;
font-weight:600;
white-space:nowrap;
color:white;
}

@keyframes slideUp{
0%{
transform:translateY(120%);
opacity:0;
}
100%{
transform:translateY(0%);
opacity:1
}}
@keyframes boxReveal{
0%{
opacity:0;
transform:translateY(100px)
scale(.92);
}
100%{
opacity:1;
transform:
translateY(0)
scale(1);
}}
@keyframes moveLeft{
from{
transform:translateX(0);
}
to{
transform:translateX(-50%);
}}
@keyframes showText{
from{
opacity:0;}
to{
opacity:1}}
@keyframes rotateImage{
from{
transform:rotate(360deg);}
to{
transform:rotate(0deg);}
}
@keyframes imageSlideUp{
0%{
transform:translateX(0%);
}
20%{
transform:translateX(0%);
}70%{
transform:translateX(0%);
}
100%{
transform:translateX(100%);
}}
@keyframes imageScaleUp{
0%{
transform:scale(.7);
}
30%{
transform:scale(1);
}70%{
transform:scale(1.15);
}
100%{
transform:scale(1.3);
}}
@keyframes welcomeMove{
from{
transform:translateX(100%);
}
to{
transform:translateX(-100%);
}
}
</style>
</head>
<body>
<section class="hero">
<div class="heading">
<div class="line">
<span>Css</span>
</div>
<div class="line">
<span>Only</span>
</div>
<div class="line">
<span>Animations</span>
</div>
</div>

<div class="boxes">
<div class="box"></div>
<div class="box"></div>
<div class="box"></div>
</div>
<div class="wrapper">
<div class="marquee">
<span>hi everyone</span>
<span>hi everyone</span>
<span>hi everyone</span>
<span>hi everyone</span>
